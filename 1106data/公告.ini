# 软件常见
## 一、网络与镜像下载
1. **下载慢、镜像站测速正常却无法使用**
Ping 测速仅检测连通性，不代表下载可用；镜像站自带缓存，游戏资源更新后需等待数分钟甚至更久才会同步刷新。下载卡顿、速度慢时，直接切换内置镜像站，也可自行搜索 GitHub 镜像站设置自定义加速，默认镜像日常使用完全够用。

2. **软件卡顿、未响应、无法读取公告和资源数据**
多为当前镜像站网络波动、文件读取超时导致；公告与资源数据的读取校验依赖当前镜像线路，出现异常只需更换镜像站即可恢复。

## 二、仓库资源管理
1. **为什么不能随意切换仓库资源**
不同仓库的MOD文件、存放路径、文件结构均不相同，随意切换容易引发文件冲突、游戏报错崩溃。选定仓库后建议固定使用，不要随意更换。

2. **更新全部资源 适用场景**
软件默认通过MD5校验，自动增量下载差异文件；仅在怀疑资源缺失、文件损坏、下载不完整时，才需要手动点击更新全部资源。

3. **初始化 功能作用**
将软件功能状态恢复初始设置（如检测更新按钮配置），只重置软件逻辑，**不会删除或改动已下载的游戏资源**。

## 三、插件与界面公告
1. **插件用途与使用**
插件属于软件额外功能扩展，目前仅自带公告插件；无强制绑定，不需要可直接删除、卸载，不影响软件核心下载功能。

2. **左侧公告每个人显示不一样**
公告、更新日志均为资源作者自行编辑发布，软件只负责读取展示，和软件本身无关，不同仓库、不同用户显示内容会有差异。

## 四、隐私与数据统计
左下角显示在线人数**不会收集任何个人隐私**，软件纯绿色，仅依靠MD5校验游戏资源下载。
人数统计原理：生成唯一加密文本上传服务器，仅用于统计软件使用规模、优化服务器配置，无个人信息采集。
